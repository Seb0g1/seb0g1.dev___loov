services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tehno_halava
      POSTGRES_USER: tehno
      POSTGRES_PASSWORD: tehno
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://tehno:tehno@db:5432/tehno_halava
    volumes:
      - ./storage:/app/storage
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "7070:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
